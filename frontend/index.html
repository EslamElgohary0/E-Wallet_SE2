<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moneylliza - محفظتك الرقمية الآمنة</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .input-group { transition: all 0.3s ease; }
        .input-group:focus-within { transform: translateY(-2px); }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }
        .toast-notification {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 9999;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .tab-active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .tab-inactive {
            background: #f3f4f6;
            color: #6b7280;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="glass-card max-w-md w-full p-8">
       
        <div class="text-center mb-8">
            <div class="text-5xl mb-3">
                <i class="fas fa-wallet text-purple-600"></i>
            </div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-transparent">
                Moneylliza
            </h1>
            <p class="text-gray-500 mt-2">محفظتك الرقمية الآمنة</p>
        </div>

       
        <div class="flex gap-2 mb-6">
            <button onclick="showTab('login')" id="loginTab" class="tab-active flex-1 py-3 rounded-xl font-semibold transition-all">
                <i class="fas fa-sign-in-alt ml-2"></i>تسجيل الدخول
            </button>
            <button onclick="showTab('register')" id="registerTab" class="tab-inactive flex-1 py-3 rounded-xl font-semibold transition-all">
                <i class="fas fa-user-plus ml-2"></i>حساب جديد
            </button>
        </div>

       
        <div id="loginForm" class="space-y-4">
            <div class="input-group">
                <label class="block text-gray-700 mb-2 font-semibold">
                    <i class="fas fa-envelope ml-1 text-purple-600"></i>البريد الإلكتروني
                </label>
                <input type="email" id="loginEmail" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition" placeholder="example@email.com">
            </div>
            <div class="input-group">
                <label class="block text-gray-700 mb-2 font-semibold">
                    <i class="fas fa-lock ml-1 text-purple-600"></i>كلمة المرور
                </label>
                <input type="password" id="loginPassword" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition" placeholder="********">
            </div>
            <button onclick="login()" class="btn-primary w-full py-3 rounded-xl text-white font-bold text-lg">
                <i class="fas fa-arrow-left ml-2"></i>دخول
            </button>
        </div>

        
        <div id="registerForm" class="space-y-4 hidden">
            <div class="grid grid-cols-2 gap-3">
                <div class="input-group">
                    <label class="block text-gray-700 mb-2 font-semibold text-sm">
                        <i class="fas fa-user ml-1 text-purple-600"></i>الاسم الأول
                    </label>
                    <input type="text" id="regFirstName" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition" placeholder="أحمد">
                </div>
                <div class="input-group">
                    <label class="block text-gray-700 mb-2 font-semibold text-sm">
                        <i class="fas fa-user ml-1 text-purple-600"></i>الاسم الأخير
                    </label>
                    <input type="text" id="regLastName" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition" placeholder="محمد">
                </div>
            </div>
            <div class="input-group">
                <label class="block text-gray-700 mb-2 font-semibold">
                    <i class="fas fa-envelope ml-1 text-purple-600"></i>البريد الإلكتروني
                </label>
                <input type="email" id="regEmail" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition" placeholder="example@email.com">
            </div>
            <div class="input-group">
                <label class="block text-gray-700 mb-2 font-semibold">
                    <i class="fas fa-lock ml-1 text-purple-600"></i>كلمة المرور
                </label>
                <input type="password" id="regPassword" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition" placeholder="******** (8 أحرف على الأقل)">
            </div>
            <div class="input-group">
                <label class="block text-gray-700 mb-2 font-semibold">
                    <i class="fas fa-phone ml-1 text-purple-600"></i>رقم الهاتف
                </label>
                <input type="tel" id="regPhone" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition" placeholder="010XXXXXXXX">
            </div>
            <button onclick="register()" class="btn-primary w-full py-3 rounded-xl text-white font-bold text-lg">
                <i class="fas fa-user-plus ml-2"></i>إنشاء حساب
            </button>
        </div>

        
        <div class="mt-6 p-4 bg-blue-50 rounded-xl border border-blue-200">
            <p class="text-blue-800 text-sm font-semibold mb-2">
                <i class="fas fa-info-circle ml-1"></i>تعليمات مهمة:
            </p>
            <ul class="text-blue-700 text-xs space-y-1">
                <li><i class="fas fa-check-circle ml-1 text-green-600"></i> كلمة المرور يجب أن تكون 8 أحرف على الأقل</li>
                <li><i class="fas fa-check-circle ml-1 text-green-600"></i> البريد الإلكتروني يجب أن يكون فريد وغير مستخدم من قبل</li>
                <li><i class="fas fa-exclamation-triangle ml-1 text-yellow-600"></i> بعد التسجيل، ستحتاج لإنشاء محفظة من لوحة التحكم</li>
                <li><i class="fas fa-exclamation-triangle ml-1 text-yellow-600"></i> لا يمكن إنشاء أكثر من محفظة لنفس المستخدم</li>
            </ul>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080';
        
        function showToast(message, type = 'error') {
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                warning: 'bg-yellow-500',
                info: 'bg-blue-500'
            };
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-times-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };
            const toast = document.createElement('div');
            toast.className = `toast-notification ${colors[type]} text-white px-6 py-4 rounded-xl shadow-lg flex items-center justify-between`;
            toast.innerHTML = `
                <div class="flex items-center gap-3">
                    <i class="fas ${icons[type]} text-xl"></i>
                    <span>${message}</span>
                </div>
                <button onclick="this.parentElement.remove()" class="text-white hover:text-gray-200">
                    <i class="fas fa-times"></i>
                </button>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        function showTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            
            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginTab.className = 'tab-active flex-1 py-3 rounded-xl font-semibold transition-all';
                registerTab.className = 'tab-inactive flex-1 py-3 rounded-xl font-semibold transition-all';
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                loginTab.className = 'tab-inactive flex-1 py-3 rounded-xl font-semibold transition-all';
                registerTab.className = 'tab-active flex-1 py-3 rounded-xl font-semibold transition-all';
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showToast('يرجى إدخال البريد الإلكتروني وكلمة المرور', 'warning');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || 'فشل تسجيل الدخول');
                }
                
                localStorage.setItem('token', data.token);
                localStorage.setItem('userRole', data.role);
                localStorage.setItem('userEmail', data.email);
                localStorage.setItem('userId', data.userId);
                localStorage.setItem('firstName', data.firstName);
                
                showToast('تم تسجيل الدخول بنجاح! جاري التحويل...', 'success');
                
                setTimeout(() => {
                    if (data.role === 'ROLE_ADMIN') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'user-dashboard.html';
                    }
                }, 1500);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function register() {
            const firstName = document.getElementById('regFirstName').value;
            const lastName = document.getElementById('regLastName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const phoneNumber = document.getElementById('regPhone').value;
            
            if (!firstName || !lastName || !email || !password) {
                showToast('يرجى ملء جميع الحقول المطلوبة', 'warning');
                return;
            }
            
            if (password.length < 8) {
                showToast('كلمة المرور يجب أن تكون 8 أحرف على الأقل', 'warning');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, password, phoneNumber })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || 'فشل إنشاء الحساب');
                }
                
                showToast('تم إنشاء الحساب بنجاح! يمكنك تسجيل الدخول الآن', 'success');
                showTab('login');
                
                document.getElementById('regFirstName').value = '';
                document.getElementById('regLastName').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regPhone').value = '';
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
    </script>
</body>
</html>
