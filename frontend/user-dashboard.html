<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moneylliza - لوحة تحكم المستخدم</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background: #f5f7fa; }
        .sidebar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .btn-action { transition: all 0.2s ease; }
        .btn-action:hover { transform: scale(1.05); }
        .transaction-item { transition: all 0.2s ease; }
        .transaction-item:hover { background: #f9fafb; transform: translateX(-5px); }
    </style>
</head>
<body class="flex">
    
    <aside class="sidebar w-72 min-h-screen text-white p-6 shadow-xl">
        <div class="text-center mb-8">
            <div class="text-5xl mb-3">
                <i class="fas fa-wallet"></i>
            </div>
            <h2 class="text-2xl font-bold">Moneylliza</h2>
            <p class="text-purple-200 text-sm mt-1">مرحباً، <span id="userName">المستخدم</span></p>
        </div>
        
        <nav class="space-y-2">
            <div class="bg-white/20 rounded-xl p-3 cursor-pointer" onclick="showSection('wallet')">
                <i class="fas fa-credit-card ml-3"></i>
                <span>محفظتي</span>
            </div>
            <div class="opacity-75 hover:opacity-100 transition p-3 rounded-xl cursor-pointer" onclick="showSection('transactions')">
                <i class="fas fa-exchange-alt ml-3"></i>
                <span>المعاملات</span>
            </div>
            <div class="opacity-75 hover:opacity-100 transition p-3 rounded-xl cursor-pointer" onclick="showSection('notifications')">
                <i class="fas fa-bell ml-3"></i>
                <span>الإشعارات</span>
            </div>
        </nav>
        
        <div class="absolute bottom-6 left-6 right-6">
            <button onclick="logout()" class="w-full bg-red-500/20 hover:bg-red-500/30 transition p-3 rounded-xl">
                <i class="fas fa-sign-out-alt ml-2"></i>
                تسجيل خروج
            </button>
        </div>
    </aside>
    
   
    <main class="flex-1 p-8">
       
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">
                <i class="fas fa-tachometer-alt ml-3 text-purple-600"></i>
                لوحة التحكم
            </h1>
            <div class="flex gap-3">
                <button onclick="refreshAll()" class="bg-purple-100 text-purple-600 px-4 py-2 rounded-xl hover:bg-purple-200 transition">
                    <i class="fas fa-sync-alt ml-2"></i>
                    تحديث الكل
                </button>
            </div>
        </div>
        
       
        <div id="walletSection" class="space-y-6">
           
            <div id="walletCard" class="grid md:grid-cols-2 gap-6 mb-8 hidden">
                <div class="card bg-gradient-to-r from-purple-500 to-indigo-600 rounded-2xl p-6 text-white shadow-lg">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-purple-200 text-sm">الرصيد الحالي</p>
                            <p class="text-4xl font-bold mt-2" id="walletBalance">0.00 EGP</p>
                        </div>
                        <i class="fas fa-wallet text-5xl text-white/20"></i>
                    </div>
                    <div class="border-t border-white/20 pt-4 mt-4">
                        <p class="text-purple-200 text-sm">رقم المحفظة</p>
                        <p class="font-mono text-sm" id="walletNumber">---</p>
                    </div>
                </div>
                
                <div class="card bg-white rounded-2xl p-6 shadow-lg">
                    <h3 class="font-bold text-gray-800 mb-4 text-lg">
                        <i class="fas fa-chart-line ml-2 text-purple-600"></i>
                        الإجراءات السريعة
                    </h3>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="showModal('deposit')" class="btn-action bg-green-500 text-white p-3 rounded-xl hover:bg-green-600">
                            <i class="fas fa-plus-circle ml-2"></i>
                            إيداع
                        </button>
                        <button onclick="showModal('withdraw')" class="btn-action bg-orange-500 text-white p-3 rounded-xl hover:bg-orange-600">
                            <i class="fas fa-minus-circle ml-2"></i>
                            سحب
                        </button>
                        <button onclick="showModal('transfer')" class="btn-action bg-blue-500 text-white p-3 rounded-xl col-span-2 hover:bg-blue-600">
                            <i class="fas fa-exchange-alt ml-2"></i>
                            تحويل أموال
                        </button>
                    </div>
                </div>
            </div>
            
           
            <div id="noWalletCard" class="bg-yellow-50 border border-yellow-200 rounded-2xl p-8 text-center">
                <i class="fas fa-exclamation-triangle text-5xl text-yellow-500 mb-4"></i>
                <p class="text-gray-700 text-lg mb-6">ليس لديك محفظة بعد! قم بإنشاء محفظة جديدة للبدء</p>
                <button onclick="createWallet()" class="bg-purple-600 text-white px-8 py-3 rounded-xl hover:bg-purple-700 transition text-lg font-semibold">
                    <i class="fas fa-plus-circle ml-2"></i>
                    إنشاء محفظة
                </button>
            </div>
        </div>
        
        
        <div id="transactionsSection" class="hidden">
            <div class="bg-white rounded-2xl p-6 shadow-lg">
                <h2 class="text-xl font-bold text-gray-800 mb-4">
                    <i class="fas fa-history ml-2 text-purple-600"></i>
                    سجل المعاملات
                </h2>
                <div id="transactionsList" class="space-y-3 max-h-96 overflow-y-auto">
                </div>
            </div>
        </div>
        
        
        <div id="notificationsSection" class="hidden">
            <div class="bg-white rounded-2xl p-6 shadow-lg">
                <h2 class="text-xl font-bold text-gray-800 mb-4">
                    <i class="fas fa-bell ml-2 text-purple-600"></i>
                    الإشعارات
                </h2>
                <div id="notificationsList" class="space-y-3 max-h-96 overflow-y-auto">
                </div>
            </div>
        </div>
    </main>
    
    
    <div id="actionModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4 modal">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800" id="modalTitle"></h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
    <script>
        let currentWallet = null;
        
        if (!checkAuth()) window.location.href = 'index.html';
        
        document.getElementById('userName').innerText = localStorage.getItem('firstName') || 'المستخدم';
        
        loadWallet();
        
        async function loadWallet() {
            try {
                const response = await fetch(`${API_BASE}/api/wallet/me`, {
                    headers: getAuthHeaders()
                });
                
                if (response.status === 404 || response.status === 500) {
                    document.getElementById('noWalletCard').classList.remove('hidden');
                    document.getElementById('walletCard').classList.add('hidden');
                    return;
                }
                
                if (!response.ok) throw new Error('فشل تحميل المحفظة');
                
                currentWallet = await response.json();
                document.getElementById('walletBalance').innerHTML = formatCurrency(currentWallet.balance);
                document.getElementById('walletNumber').innerText = currentWallet.walletNumber;
                document.getElementById('noWalletCard').classList.add('hidden');
                document.getElementById('walletCard').classList.remove('hidden');
            } catch (error) {
                console.error('Error loading wallet:', error);
                document.getElementById('noWalletCard').classList.remove('hidden');
                document.getElementById('walletCard').classList.add('hidden');
            }
        }
        
        async function createWallet() {
            try {
                const response = await fetch(`${API_BASE}/api/wallet/create`, {
                    method: 'POST',
                    headers: getAuthHeaders()
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'فشل إنشاء المحفظة');
                }
                
                showToast('تم إنشاء المحفظة بنجاح!', 'success');
                await loadWallet();
                refreshAll();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        function showModal(action) {
            const modal = document.getElementById('actionModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            if (action === 'deposit') {
                modalTitle.innerHTML = '<i class="fas fa-plus-circle ml-2 text-green-500"></i>إيداع أموال';
                modalBody.innerHTML = `
                    <div class="space-y-4">
                        <div>
                            <label class="block text-gray-700 mb-2 font-semibold">المبلغ</label>
                            <input type="number" id="amountInput" class="w-full px-4 py-3 border border-gray-300 rounded-xl" placeholder="أدخل المبلغ">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2 font-semibold">الوصف (اختياري)</label>
                            <input type="text" id="descInput" class="w-full px-4 py-3 border border-gray-300 rounded-xl" placeholder="سبب الإيداع">
                        </div>
                        <button onclick="deposit()" class="w-full bg-green-500 text-white py-3 rounded-xl hover:bg-green-600 transition">
                            تأكيد الإيداع
                        </button>
                    </div>
                `;
            } else if (action === 'withdraw') {
                modalTitle.innerHTML = '<i class="fas fa-minus-circle ml-2 text-orange-500"></i>سحب أموال';
                modalBody.innerHTML = `
                    <div class="space-y-4">
                        <div>
                            <label class="block text-gray-700 mb-2 font-semibold">المبلغ</label>
                            <input type="number" id="amountInput" class="w-full px-4 py-3 border border-gray-300 rounded-xl" placeholder="أدخل المبلغ">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2 font-semibold">الوصف (اختياري)</label>
                            <input type="text" id="descInput" class="w-full px-4 py-3 border border-gray-300 rounded-xl" placeholder="سبب السحب">
                        </div>
                        <button onclick="withdraw()" class="w-full bg-orange-500 text-white py-3 rounded-xl hover:bg-orange-600 transition">
                            تأكيد السحب
                        </button>
                    </div>
                `;
            } else if (action === 'transfer') {
                modalTitle.innerHTML = '<i class="fas fa-exchange-alt ml-2 text-blue-500"></i>تحويل أموال';
                modalBody.innerHTML = `
                    <div class="space-y-4">
                        <div>
                            <label class="block text-gray-700 mb-2 font-semibold">البريد الإلكتروني للمستلم</label>
                            <input type="email" id="receiverEmail" class="w-full px-4 py-3 border border-gray-300 rounded-xl" placeholder="example@email.com">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2 font-semibold">المبلغ</label>
                            <input type="number" id="amountInput" class="w-full px-4 py-3 border border-gray-300 rounded-xl" placeholder="أدخل المبلغ">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2 font-semibold">الوصف (اختياري)</label>
                            <input type="text" id="descInput" class="w-full px-4 py-3 border border-gray-300 rounded-xl" placeholder="سبب التحويل">
                        </div>
                        <button onclick="transfer()" class="w-full bg-blue-500 text-white py-3 rounded-xl hover:bg-blue-600 transition">
                            تأكيد التحويل
                        </button>
                    </div>
                `;
            }
        }
        
        async function deposit() {
            const amount = document.getElementById('amountInput')?.value;
            const description = document.getElementById('descInput')?.value;
            
            if (!amount || amount <= 0) {
                showToast('يرجى إدخال مبلغ صحيح أكبر من 0', 'warning');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/wallet/deposit`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ amount: parseFloat(amount), description: description || '' })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'فشل الإيداع');
                }
                
                showToast('تم الإيداع بنجاح!', 'success');
                closeModal();
                await loadWallet();
                refreshAll();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function withdraw() {
            const amount = document.getElementById('amountInput')?.value;
            const description = document.getElementById('descInput')?.value;
            
            if (!amount || amount <= 0) {
                showToast('يرجى إدخال مبلغ صحيح أكبر من 0', 'warning');
                return;
            }
            
            if (currentWallet && amount > currentWallet.balance) {
                showToast('الرصيد غير كافٍ لعملية السحب', 'warning');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/wallet/withdraw`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ amount: parseFloat(amount), description: description || '' })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'فشل السحب');
                }
                
                showToast('تم السحب بنجاح!', 'success');
                closeModal();
                await loadWallet();
                refreshAll();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function transfer() {
            const receiverEmail = document.getElementById('receiverEmail')?.value;
            const amount = document.getElementById('amountInput')?.value;
            const description = document.getElementById('descInput')?.value;
            
            if (!receiverEmail) {
                showToast('يرجى إدخال البريد الإلكتروني للمستلم', 'warning');
                return;
            }
            
            if (!amount || amount <= 0) {
                showToast('يرجى إدخال مبلغ صحيح أكبر من 0', 'warning');
                return;
            }
            
            if (currentWallet && amount > currentWallet.balance) {
                showToast('الرصيد غير كافٍ لعملية التحويل', 'warning');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/transactions/transfer`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ receiverEmail, amount: parseFloat(amount), description: description || '' })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'فشل التحويل');
                }
                
                showToast('تم التحويل بنجاح!', 'success');
                closeModal();
                await loadWallet();
                refreshAll();
                if (!document.getElementById('transactionsSection').classList.contains('hidden')) {
                    loadTransactions();
                }
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function loadTransactions() {
            try {
                const response = await fetch(`${API_BASE}/api/transactions/my`, {
                    headers: getAuthHeaders()
                });
                
                if (!response.ok) throw new Error('فشل تحميل المعاملات');
                
                const transactions = await response.json();
                const container = document.getElementById('transactionsList');
                
                if (!transactions.length) {
                    container.innerHTML = `
                        <div class="text-center py-8 text-gray-500">
                            <i class="fas fa-inbox text-5xl mb-3"></i>
                            <p>لا توجد معاملات حتى الآن</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = transactions.map(t => `
                    <div class="transaction-item bg-gray-50 rounded-xl p-4 border border-gray-200">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="font-semibold text-gray-800">
                                    ${t.type === 'TRANSFER' ? 
                                        (t.senderEmail === localStorage.getItem('userEmail') ? 
                                            '<i class="fas fa-arrow-up text-red-500 ml-1"></i> تحويل مرسل' : 
                                            '<i class="fas fa-arrow-down text-green-500 ml-1"></i> تحويل وارد') 
                                        : '<i class="fas fa-exchange-alt ml-1 text-blue-500"></i> معاملة'}
                                </p>
                                <p class="text-sm text-gray-500 mt-1">${formatDate(t.createdAt)}</p>
                                ${t.description ? `<p class="text-xs text-gray-400 mt-1">${t.description}</p>` : ''}
                            </div>
                            <div class="text-left">
                                <p class="font-bold ${t.senderEmail === localStorage.getItem('userEmail') ? 'text-red-600' : 'text-green-600'}">
                                    ${t.senderEmail === localStorage.getItem('userEmail') ? '-' : '+'} ${formatCurrency(t.amount)}
                                </p>
                                <p class="text-xs text-gray-500 mt-1">${t.status === 'COMPLETED' ? '<span class="text-green-600">مكتملة</span>' : '<span class="text-red-600">فاشلة</span>'}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function loadNotifications() {
            try {
                const response = await fetch(`${API_BASE}/api/notifications/my`, {
                    headers: getAuthHeaders()
                });
                
                if (!response.ok) throw new Error('فشل تحميل الإشعارات');
                
                const notifications = await response.json();
                const container = document.getElementById('notificationsList');
                
                if (!notifications.length) {
                    container.innerHTML = `
                        <div class="text-center py-8 text-gray-500">
                            <i class="fas fa-bell-slash text-5xl mb-3"></i>
                            <p>لا توجد إشعارات</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = notifications.map(n => `
                    <div class="bg-${n.read ? 'gray-50' : 'purple-50'} rounded-xl p-4 border border-${n.read ? 'gray-200' : 'purple-200'} cursor-pointer hover:shadow transition" onclick="markAsRead('${n.id}')">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <p class="font-semibold text-gray-800">${n.title}</p>
                                <p class="text-sm text-gray-600 mt-1">${n.message}</p>
                                <p class="text-xs text-gray-400 mt-2">${formatDate(n.createdAt)}</p>
                            </div>
                            ${!n.read ? '<span class="bg-purple-500 text-white text-xs px-2 py-1 rounded-full">جديد</span>' : ''}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function markAsRead(notificationId) {
            try {
                await fetch(`${API_BASE}/api/notifications/${notificationId}/read`, {
                    method: 'PUT',
                    headers: getAuthHeaders()
                });
                await loadNotifications();
            } catch (error) {
                console.error('Error marking notification as read:', error);
            }
        }
        
        function showSection(section) {
            document.getElementById('walletSection').classList.add('hidden');
            document.getElementById('transactionsSection').classList.add('hidden');
            document.getElementById('notificationsSection').classList.add('hidden');
            
            if (section === 'transactions') {
                document.getElementById('transactionsSection').classList.remove('hidden');
                loadTransactions();
            } else if (section === 'notifications') {
                document.getElementById('notificationsSection').classList.remove('hidden');
                loadNotifications();
            } else {
                document.getElementById('walletSection').classList.remove('hidden');
            }
        }
        
        function refreshAll() {
            loadWallet();
            if (!document.getElementById('transactionsSection').classList.contains('hidden')) {
                loadTransactions();
            }
            if (!document.getElementById('notificationsSection').classList.contains('hidden')) {
                loadNotifications();
            }
        }
        
        function closeModal() {
            const modal = document.getElementById('actionModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
    </script>
</body>
</html>
