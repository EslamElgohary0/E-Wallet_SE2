server:
  port: 8082

spring:
  application:
    name: wallet-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/ewallet_wallet
      database: ewallet_wallet

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: ewallet-super-secret-key-2024-must-be-at-least-256-bits-long!!

management:
  endpoints:
    web:
      exposure:
        include: health,info